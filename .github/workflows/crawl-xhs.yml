name: 小红书定时爬取

on:
  schedule:
    # 每30分钟自动运行一次
    - cron: '*/30 * * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 安装依赖
        run: cd server && npm install
      - name: 运行小红书爬虫
        run: cd server && node local-crawler.js
